<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Lab 3</title>
    <style>
        body { background: #1e1e2e; color: #cdd6f4; font-family: 'Consolas', monospace; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px; }
        h1 { color: #89b4fa; margin-bottom: 20px; }
        .editor {
            background: #181825;
            border: 1px solid #313244;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: transparent;
            border: none;
            color: #a6e3a1;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
        }
        textarea:focus { outline: none; }
        .output {
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 12px;
            padding: 20px;
            min-height: 150px;
            white-space: pre-wrap;
            color: #f9e2af;
        }
        .run-btn {
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .run-btn:hover { background: #b4befe; }
        .examples { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .ex-btn {
            background: #313244;
            color: #cdd6f4;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .ex-btn:hover { background: #45475a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Python Lab - Project 3</h1>
        <div class="examples">
            <button class="ex-btn" onclick="loadExample('hello')">Hello World</button>
            <button class="ex-btn" onclick="loadExample('fib')">Fibonacci</button>
            <button class="ex-btn" onclick="loadExample('sort')">Sorting</button>
            <button class="ex-btn" onclick="loadExample('math')">Math</button>
        </div>
        <div class="editor"><textarea id="code" spellcheck="false"># Project 3 - Python Playground
def greet(name):
    return f"Hello, {name}!"

print(greet("Developer"))
print(f"Project number: 3")</textarea></div>
        <button class="run-btn" onclick="runCode()">▶ Run Code</button>
        <div class="output" id="output">Natija shu yerda ko'rinadi...</div>
    </div>
    <script>
        const examples = {
            hello: '# Hello World\nfor i in range(5):\n    print(f"Hello {i}!")\nprint("Done!")',
            fib: '# Fibonacci\ndef fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        print(a, end=" ")\n        a, b = b, a+b\nfib(20)',
            sort: '# Bubble Sort\ndef sort(arr):\n    n = len(arr)\n    for i in range(n):\n        for j in range(0, n-i-1):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n    return arr\nprint(sort([64, 34, 25, 12, 22, 11, 90]))',
            math: '# Math Operations\nimport math\nprint(f"PI = {math.pi}")\nprint(f"e = {math.e}")\nprint(f"sqrt(144) = {math.sqrt(144)}")\nprint(f"2^10 = {2**10}")'
        };
        function loadExample(name) { document.getElementById('code').value = examples[name]; }
        function runCode() {
            const code = document.getElementById('code').value;
            const output = document.getElementById('output');
            output.textContent = 'Running...\n';
            setTimeout(() => {
                try {
                    let result = 'Output:\n';
                    const lines = code.split('\n');
                    lines.forEach(line => {
                        const printMatch = line.match(/print\((.+)\)/);
                        if (printMatch) {
                            let val = printMatch[1].replace(/f"/g, '"').replace(/f'/g, "'");
                            result += eval(val) + '\n';
                        }
                    });
                    output.textContent = result;
                } catch(e) { output.textContent = 'Error: ' + e.message; }
            }, 500);
        }
    </script>
</body>
</html>
